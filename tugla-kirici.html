<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Striker Ultimate</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green:  #39ff14;
            --neon-red:    #ff073a;
            --neon-blue:   #00e5ff;
            --neon-yellow: #fff01f;
            --neon-pink:   #ff2d78;
            --ground-color:#0d0d0d;
            --bg:          #050810;
            --panel:       rgba(0,10,30,0.85);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            background: var(--bg);
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            touch-action: none;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Animated grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,229,255,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,229,255,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 500px;
            background: var(--bg);
            border-left:  1px solid rgba(0,229,255,0.2);
            border-right: 1px solid rgba(0,229,255,0.2);
            box-shadow:
                0 0 60px rgba(0,229,255,0.08),
                inset 0 0 40px rgba(0,0,0,0.5);
        }

        canvas { display: block; }

        /* ─── HEADER ──────────────────────────────── */
        .header {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 64px;
            background: var(--panel);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            border-bottom: 1px solid rgba(0,229,255,0.25);
            z-index: 10;
            gap: 4px;
        }

        .header-stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            flex: 1;
        }
        .header-stat .label {
            font-family: 'Orbitron', monospace;
            font-size: 8px;
            letter-spacing: 2px;
            color: rgba(0,229,255,0.5);
            text-transform: uppercase;
        }
        .header-stat .value {
            font-family: 'Orbitron', monospace;
            font-size: 18px;
            font-weight: 700;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
        }

        /* ─── HEADER ICON BUTTONS ────────────────── */
        .header-icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: rgba(0,229,255,0.07);
            border: 1px solid rgba(0,229,255,0.35);
            color: var(--neon-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s;
            flex-shrink: 0;
        }
        .header-icon-btn:hover, .header-icon-btn:active {
            background: rgba(0,229,255,0.18);
            box-shadow: 0 0 14px rgba(0,229,255,0.4);
        }
        .header-icon-btn svg {
            width: 16px; height: 16px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        #upload-input { display: none; }

        /* ─── BACK BUTTON ─────────────────────────── */
        #back-btn {
            position: absolute;
            top: 12px;
            left: 12px;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: linear-gradient(160deg, rgba(0,229,255,0.14), rgba(0,229,255,0.04));
            border: 1px solid rgba(0,229,255,0.45);
            color: var(--neon-blue);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 300;
            transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
            line-height: 1;
            box-shadow: 0 0 12px rgba(0,229,255,0.25), inset 0 0 8px rgba(0,229,255,0.08);
        }
        #back-btn:hover {
            background: linear-gradient(160deg, rgba(0,229,255,0.26), rgba(0,229,255,0.08));
            box-shadow: 0 0 20px rgba(0,229,255,0.55), inset 0 0 10px rgba(0,229,255,0.15);
        }
        #back-btn:active {
            transform: scale(0.92);
        }
        #back-btn svg {
            width: 18px; height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 4px rgba(0,229,255,0.7));
        }

        /* ─── BOTTOM BAR ──────────────────────────── */
        .bottom-bar {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%;
            height: 54px;
            background: var(--panel);
            border-top: 1px solid rgba(0,229,255,0.25);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }
        .bottom-bar span {
            font-family: 'Orbitron', monospace;
            font-size: 9px;
            letter-spacing: 3px;
            color: rgba(0,229,255,0.35);
        }

        /* ─── SPEED BUTTON ────────────────────────── */
        #speed-btn {
            position: absolute;
            bottom: 64px;
            right: 16px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255,240,31,0.08);
            border: 1.5px solid var(--neon-yellow);
            color: var(--neon-yellow);
            font-family: 'Orbitron', monospace;
            font-size: 11px;
            font-weight: 700;
            display: none;
            z-index: 10;
            cursor: pointer;
            text-shadow: 0 0 8px var(--neon-yellow);
            box-shadow: 0 0 12px rgba(255,240,31,0.2);
            transition: box-shadow 0.2s;
        }
        #speed-btn:hover { box-shadow: 0 0 22px rgba(255,240,31,0.5); }

        /* ─── BALL INFO ───────────────────────────── */
        .ball-info {
            position: absolute;
            bottom: 62px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            letter-spacing: 1px;
            white-space: nowrap;
            pointer-events: none;
        }

        /* ─── OVERLAY ─────────────────────────────── */
        .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(5,8,16,0.93);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            gap: 20px;
        }

        .overlay-logo {
            font-family: 'Orbitron', monospace;
            font-size: 13px;
            letter-spacing: 6px;
            color: rgba(0,229,255,0.45);
            margin-bottom: -10px;
        }
        .overlay-title {
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: clamp(28px, 9vw, 42px);
            letter-spacing: 4px;
            color: var(--neon-blue);
            text-shadow:
                0 0 20px var(--neon-blue),
                0 0 60px rgba(0,229,255,0.3);
            margin: 0;
        }
        .overlay-subtitle {
            font-size: 12px;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.35);
            margin-top: -12px;
        }

        /* Stats box on game over */
        .stats-box {
            background: rgba(0,229,255,0.05);
            border: 1px solid rgba(0,229,255,0.2);
            border-radius: 8px;
            padding: 16px 32px;
            text-align: center;
            width: 220px;
        }
        .stats-box .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            gap: 20px;
        }
        .stats-box .stat-row:last-child { border-bottom: none; }
        .stats-box .stat-label {
            font-size: 10px;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.4);
        }
        .stats-box .stat-val {
            font-family: 'Orbitron', monospace;
            font-size: 16px;
            font-weight: 700;
            color: var(--neon-green);
            text-shadow: 0 0 8px var(--neon-green);
        }

        /* Game over title */
        .gameover-title {
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: clamp(26px, 8vw, 38px);
            letter-spacing: 3px;
            color: var(--neon-red);
            text-shadow:
                0 0 20px var(--neon-red),
                0 0 50px rgba(255,7,58,0.3);
            margin: 0;
            animation: flicker 1.5s infinite;
        }
        @keyframes flicker {
            0%,100% { opacity: 1; }
            92% { opacity: 1; }
            93% { opacity: 0.7; }
            94% { opacity: 1; }
            96% { opacity: 0.5; }
            97% { opacity: 1; }
        }

        /* Buttons */
        .btn {
            font-family: 'Orbitron', monospace;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 3px;
            background: transparent;
            color: var(--neon-green);
            border: 1.5px solid var(--neon-green);
            padding: 14px 36px;
            cursor: pointer;
            box-shadow: 0 0 18px rgba(57,255,20,0.25), inset 0 0 0 0 rgba(57,255,20,0);
            transition: box-shadow 0.2s, background 0.2s;
            clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
        }
        .btn:hover {
            background: rgba(57,255,20,0.08);
            box-shadow: 0 0 30px rgba(57,255,20,0.45);
        }
        .btn.secondary {
            color: var(--neon-blue);
            border-color: var(--neon-blue);
            box-shadow: 0 0 14px rgba(0,229,255,0.2);
            font-size: 11px;
            padding: 11px 28px;
        }
        .btn.secondary:hover {
            background: rgba(0,229,255,0.08);
            box-shadow: 0 0 24px rgba(0,229,255,0.4);
        }

        /* Scanline effect */
        #game-container::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.04) 2px,
                rgba(0,0,0,0.04) 4px
            );
            pointer-events: none;
            z-index: 200;
        }

        /* ── AdSense Reklam Kutusu (Overlay içi) ── */
        .mg-ad-box {
            position: relative;
            width: 300px;
            background: rgba(5, 8, 16, 0.7);
            border: 1px solid rgba(255, 7, 58, 0.15);
            border-radius: 12px;
            padding: 24px 10px 10px;
            overflow: visible;
            box-sizing: border-box;
            min-height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .mg-ad-box ins.adsbygoogle {
            display: block !important;
            width: 300px !important;
            height: 250px !important;
        }
        .mg-ad-label {
            position: absolute;
            top: 7px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.58rem;
            font-weight: 700;
            color: rgba(255, 7, 58, 0.3);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            background: rgba(5, 8, 16, 0.95);
            padding: 2px 10px;
            border-radius: 20px;
            border: 1px solid rgba(255, 7, 58, 0.15);
            white-space: nowrap;
            pointer-events: none;
            z-index: 1;
            font-family: 'Orbitron', monospace;
        }
    </style>
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1880946354382681" crossorigin="anonymous"></script>
</head>
<body>

<div id="game-container">

    <!-- Çıkış Tuşu (Oyun Ekranı) -->
    <button id="back-btn" title="Çıkış" onclick="goBack()" style="display:none;">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>

    <div class="header">
        <!-- Sol boşluk (back btn için) -->
        <div style="width:44px; flex-shrink:0;"></div>

        <div class="header-stat">
            <div class="label">SKOR</div>
            <div class="value" id="score">0</div>
        </div>
        <div class="header-stat">
            <div class="label">TOP</div>
            <div class="value" id="ballQty">1</div>
        </div>
        <div class="header-stat">
            <div class="label">TUR</div>
            <div class="value" id="round">1</div>
        </div>

        <!-- İndir & Yükle -->
        <div style="display:flex; gap:6px; flex-shrink:0;">
            <button class="header-icon-btn" title="Skoru İndir" onclick="saveScore()">
                <svg viewBox="0 0 24 24"><path d="M12 3v13M7 11l5 5 5-5"/><path d="M5 21h14"/></svg>
            </button>
            <button class="header-icon-btn" title="Kayıt Yükle" onclick="document.getElementById('upload-input').click()">
                <svg viewBox="0 0 24 24"><path d="M12 21V8M7 13l5-5 5 5"/><path d="M5 3h14"/></svg>
            </button>
            <input type="file" id="upload-input" accept=".json" onchange="loadScore(event)">
        </div>
    </div>

    <button id="speed-btn" onclick="toggleSpeed()">2x</button>
    <div class="ball-info" id="ballInfo">Nişan al ve fırlat!</div>

    <canvas id="gameCanvas"></canvas>

    <div class="bottom-bar">
        <span>── GÜVENLİ BÖLGE ──</span>
    </div>

    <!-- Başlangıç Ekranı -->
    <div id="startScreen" class="overlay">
        <div class="overlay-logo">// ARCADE //</div>
        <h1 class="overlay-title">NEON STRIKER</h1>
        <p class="overlay-subtitle">ULTIMATE EDITION</p>
        <button class="btn" onclick="startGame()">BAŞLAT</button>
        <button class="btn secondary" onclick="goBack()">ÇIKIŞ</button>

        <!-- ── ADSENSE REKLAM 1 — Başlangıç Ekranı ── -->
        <div class="mg-ad-box" aria-label="Reklam" role="complementary">
            <span class="mg-ad-label">Reklam</span>
            <ins class="adsbygoogle"
                 style="display:block;width:300px;height:250px;"
                 data-ad-client="ca-pub-1880946354382681"
                 data-ad-slot="1689789138"
                 data-ad-format="rectangle"></ins>
        </div>
    </div>

    <!-- Oyun Bitti Ekranı -->
    <div id="gameOverScreen" class="overlay" style="display:none;">
        <h1 class="gameover-title">OYUN BİTTİ</h1>
        <div class="stats-box">
            <div class="stat-row">
                <span class="stat-label">SKOR</span>
                <span class="stat-val" id="finalScore">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">TUR</span>
                <span class="stat-val" id="finalRound">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">TOPLAR</span>
                <span class="stat-val" id="finalBalls">0</span>
            </div>
        </div>
        <button class="btn" onclick="startGame()">TEKRAR DENE</button>
        <button class="btn secondary" onclick="saveScore()">💾 SKORU İNDİR</button>

        <!-- ── ADSENSE REKLAM 2 — Oyun Sonu Ekranı ── -->
        <div class="mg-ad-box" aria-label="Reklam" role="complementary">
            <span class="mg-ad-label">Reklam</span>
            <ins class="adsbygoogle"
                 style="display:block;width:300px;height:250px;"
                 data-ad-client="ca-pub-1880946354382681"
                 data-ad-slot="1689789138"
                 data-ad-format="rectangle"></ins>
        </div>
    </div>

</div>

<script>
    const canvas  = document.getElementById("gameCanvas");
    const ctx     = canvas.getContext("2d");
    const speedBtn = document.getElementById("speed-btn");

    let width, height;
    let score = 0, round = 1, isPlaying = false;
    let totalBallCount = 1;
    let balls = [], bricks = [], items = [], particles = [];
    let isShooting = false, aiming = false;
    let timeScale = 1;
    let cannon = { x: 0, y: 0, angle: -Math.PI / 2 };
    let extraBallsThisRound = 0;
    let gameStartTime = null;

    /* ─── RESIZE ─────────────────────────── */
    function resize() {
        const c = document.getElementById("game-container");
        width = c.clientWidth;
        height = c.clientHeight;
        canvas.width  = width;
        canvas.height = height;
        cannon.x = width / 2;
        cannon.y = height - 60;
    }
    window.addEventListener("resize", resize);
    resize();

    /* ─── SPEED ──────────────────────────── */
    function toggleSpeed() {
        timeScale = (timeScale === 1) ? 3 : 1;
        speedBtn.innerText = (timeScale === 1) ? "2x" : ">>";
        speedBtn.style.color = timeScale === 1
            ? "var(--neon-yellow)"
            : "var(--neon-green)";
    }

    /* ─── ÇIKIŞ ───────────────────────────── */
    function goBack() {
        isPlaying = false;
        document.getElementById('gameOverScreen').style.display = 'none';
        document.getElementById('startScreen').style.display = 'flex';
        document.getElementById('back-btn').style.display = 'none';
    }

    /* ─── GAME START ─────────────────────── */
    function startGame() {
        score = 0; round = 1;
        totalBallCount = 1;
        extraBallsThisRound = 0;
        bricks = []; items = []; balls = []; particles = [];
        isPlaying = true; isShooting = false;
        gameStartTime = new Date();
        updateUI();
        document.getElementById("startScreen").style.display    = "none";
        document.getElementById("gameOverScreen").style.display = "none";
        document.getElementById("back-btn").style.display       = "flex";
        nextTurn();
        requestAnimationFrame(update);
    }

    /* ─── UI ─────────────────────────────── */
    function updateUI() {
        document.getElementById("score").innerText   = score;
        document.getElementById("round").innerText   = round;
        document.getElementById("ballQty").innerText = totalBallCount;
    }

    /* ─── BRICKS ─────────────────────────── */
    function createRow() {
        const cols  = 6;
        const brickW = (width - (cols + 1) * 10) / cols;
        const brickH = 35;
        for (let i = 0; i < cols; i++) {
            let x    = i * (brickW + 10) + 10;
            let rand = Math.random();
            if (rand > 0.45) {
                const hue = (round * 22 + i * 15) % 360;
                bricks.push({
                    x, y: 70, w: brickW, h: brickH,
                    hp: round,
                    color: `hsl(${hue},70%,50%)`,
                    glowColor: `hsl(${hue},100%,65%)`
                });
            } else if (rand > 0.25) {
                items.push({ x: x + brickW / 2, y: 70 + brickH / 2, type: 'plus', r: 12 });
            }
        }
    }

    function nextTurn() {
        bricks.forEach(b  => b.y  += 50);
        items.forEach(it  => it.y += 50);
        totalBallCount    += extraBallsThisRound;
        extraBallsThisRound = 0;
        createRow();
        isShooting = false;
        timeScale  = 1;
        speedBtn.style.display = "none";
        updateUI();
        checkGameOver();
    }

    function checkGameOver() {
        if (bricks.some(b => b.y + b.h > cannon.y - 20)) {
            isPlaying = false;
            document.getElementById("gameOverScreen").style.display = "flex";
            document.getElementById("finalScore").innerText = score;
            document.getElementById("finalRound").innerText = round;
            document.getElementById("finalBalls").innerText = totalBallCount;
        }
    }

    /* ─── SAVE SCORE ─────────────────────── */
    function saveScore() {
        const data = {
            oyun:    "Neon Striker Ultimate",
            skor:    score,
            tur:     round,
            toplar:  totalBallCount,
            tarih:   new Date().toLocaleString('tr-TR'),
            sureSaniye: gameStartTime
                ? Math.floor((new Date() - gameStartTime) / 1000)
                : null
        };
        const blob = new Blob(
            [JSON.stringify(data, null, 2)],
            { type: "application/json" }
        );
        const a   = document.createElement("a");
        a.href    = URL.createObjectURL(blob);
        a.download = `neon-striker-skor-${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(a.href);
    }

    /* ─── LOAD SCORE ─────────────────────── */
    function loadScore(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = JSON.parse(e.target.result);
                if (data.skor !== undefined && data.tur !== undefined && data.toplar !== undefined) {
                    const wasPlaying = isPlaying;
                    score          = data.skor;
                    round          = data.tur;
                    totalBallCount = data.toplar;
                    extraBallsThisRound = 0;
                    bricks = []; items = []; balls = []; particles = [];
                    isPlaying  = true;
                    isShooting = false;
                    gameStartTime = new Date();
                    updateUI();
                    document.getElementById("startScreen").style.display    = "none";
                    document.getElementById("gameOverScreen").style.display = "none";
                    nextTurn();
                    if (!wasPlaying) requestAnimationFrame(update);
                } else {
                    alert("Geçersiz kayıt dosyası.");
                }
            } catch {
                alert("Dosya okunamadı.");
            }
        };
        reader.readAsText(file);
        event.target.value = "";
    }

    /* ─── INPUT ──────────────────────────── */
    function handleInput(e) {
        if (!isPlaying || isShooting) return;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const rect    = canvas.getBoundingClientRect();
        let tx = clientX - rect.left;
        let ty = clientY - rect.top;
        if (ty < cannon.y) {
            cannon.angle = Math.atan2(ty - cannon.y, tx - cannon.x);
            aiming = true;
        }
    }

    function fire() {
        if (!aiming || isShooting) return;
        isShooting = true; aiming = false;
        speedBtn.style.display = "block";
        for (let i = 0; i < totalBallCount; i++) {
            setTimeout(() => {
                if (!isPlaying) return;
                balls.push({
                    x: cannon.x, y: cannon.y,
                    dx: Math.cos(cannon.angle) * 8,
                    dy: Math.sin(cannon.angle) * 8,
                    active: true,
                    trail: []
                });
            }, i * 100);
        }
    }

    canvas.addEventListener("mousedown",  () => aiming = false);
    canvas.addEventListener("mousemove",  handleInput);
    window.addEventListener("mouseup",    fire);
    canvas.addEventListener("touchstart", (e) => { e.preventDefault(); aiming = false; }, { passive: false });
    canvas.addEventListener("touchmove",  handleInput);
    window.addEventListener("touchend",   fire);

    /* ─── PARTICLES ──────────────────────── */
    function createParticles(x, y, color) {
        for (let i = 0; i < 8; i++) {
            const angle = (Math.PI * 2 / 8) * i + Math.random() * 0.5;
            const speed = 2 + Math.random() * 4;
            particles.push({
                x, y,
                dx: Math.cos(angle) * speed,
                dy: Math.sin(angle) * speed,
                life: 1,
                size: 2 + Math.random() * 3,
                color
            });
        }
    }

    /* ─── DRAW HELPERS ───────────────────── */
    function drawGlowRect(x, y, w, h, color, glowColor, hp, maxHp) {
        const ratio   = Math.min(hp / maxHp, 1);
        const glowStr = 4 + ratio * 12;

        ctx.save();
        ctx.shadowColor = glowColor;
        ctx.shadowBlur  = glowStr;

        // Body
        const grad = ctx.createLinearGradient(x, y, x, y + h);
        grad.addColorStop(0,   lighten(color, 20));
        grad.addColorStop(1,   color);
        ctx.fillStyle = grad;
        ctx.fillRect(x, y, w, h);

        // Border
        ctx.strokeStyle = glowColor;
        ctx.lineWidth   = 1;
        ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);

        // HP text
        ctx.shadowBlur  = 0;
        ctx.fillStyle   = "rgba(0,0,0,0.7)";
        ctx.fillRect(x + w/2 - 14, y + h/2 - 9, 28, 18);
        ctx.fillStyle   = "#fff";
        ctx.font        = "bold 13px 'Share Tech Mono', monospace";
        ctx.textAlign   = "center";
        ctx.textBaseline= "middle";
        ctx.fillText(hp, x + w / 2, y + h / 2);

        ctx.restore();
    }

    function lighten(hsl, amount) {
        // expects hsl(...) string
        return hsl.replace(/(\d+)%\)/, (m, n) => `${Math.min(100, parseInt(n) + amount)}%)`);
    }

    function drawCannon() {
        ctx.save();

        // Base circle glow
        ctx.shadowColor = "var(--neon-blue)";
        ctx.shadowBlur  = 16;
        ctx.beginPath();
        ctx.arc(cannon.x, cannon.y, 14, 0, Math.PI * 2);
        const baseGrad = ctx.createRadialGradient(cannon.x, cannon.y, 2, cannon.x, cannon.y, 14);
        baseGrad.addColorStop(0, "#fff");
        baseGrad.addColorStop(1, "rgba(0,229,255,0.6)");
        ctx.fillStyle = baseGrad;
        ctx.fill();

        // Barrel
        ctx.translate(cannon.x, cannon.y);
        ctx.rotate(cannon.angle);
        ctx.shadowBlur = 10;
        ctx.fillStyle  = "#00e5ff";
        const barW = 32, barH = 9;
        ctx.beginPath();
        ctx.roundRect(2, -barH / 2, barW, barH, 3);
        ctx.fill();

        // Barrel highlight
        ctx.fillStyle = "rgba(255,255,255,0.35)";
        ctx.fillRect(4, -barH / 2 + 2, barW - 4, 3);

        ctx.restore();
    }

    /* ─── MAIN UPDATE LOOP ───────────────── */
    function update() {
        if (!isPlaying) return;

        // Clear
        ctx.clearRect(0, 0, width, height);

        // Dark bg with scanline feel
        ctx.fillStyle = "rgba(5,8,16,0.7)";
        ctx.fillRect(0, 0, width, height);

        /* Particles */
        particles.forEach((p, i) => {
            p.x += p.dx; p.y += p.dy;
            p.dx *= 0.95; p.dy *= 0.95;
            p.life -= 0.03;
            ctx.globalAlpha = Math.max(0, p.life);
            ctx.fillStyle   = p.color;
            ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
            if (p.life <= 0) particles.splice(i, 1);
        });
        ctx.globalAlpha = 1;

        /* Items (+1 ball) */
        items.forEach(it => {
            ctx.save();
            ctx.shadowColor = "var(--neon-green)";
            ctx.shadowBlur  = 12;
            ctx.beginPath();
            ctx.arc(it.x, it.y, it.r, 0, Math.PI * 2);
            ctx.strokeStyle = "#39ff14";
            ctx.lineWidth   = 2;
            ctx.stroke();

            // Inner pulse
            const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 300);
            ctx.globalAlpha = 0.15 + pulse * 0.15;
            ctx.fillStyle   = "#39ff14";
            ctx.fill();
            ctx.globalAlpha = 1;

            ctx.fillStyle   = "#fff";
            ctx.font        = "bold 15px 'Share Tech Mono'";
            ctx.textAlign   = "center";
            ctx.textBaseline= "middle";
            ctx.fillText("+", it.x, it.y + 1);
            ctx.restore();
        });

        /* Aim line - bouncing */
        if (aiming) {
            ctx.save();
            ctx.setLineDash([10, 14]);
            ctx.strokeStyle = "rgba(0,229,255,0.55)";
            ctx.lineWidth   = 1.5;
            ctx.shadowColor = "var(--neon-blue)";
            ctx.shadowBlur  = 8;
            ctx.beginPath();

            let ax = cannon.x, ay = cannon.y;
            let adx = Math.cos(cannon.angle), ady = Math.sin(cannon.angle);
            const aimLen = 900;
            let remaining = aimLen;

            ctx.moveTo(ax, ay);
            while (remaining > 0) {
                // time to hit left/right wall
                const tLeft  = adx < 0 ? (8 - ax) / adx : Infinity;
                const tRight = adx > 0 ? (width - 8 - ax) / adx : Infinity;
                const tTop   = ady < 0 ? (68 - ay) / ady : Infinity;
                const tWall  = Math.min(tLeft, tRight, tTop, remaining);

                ax += adx * tWall;
                ay += ady * tWall;
                ctx.lineTo(ax, ay);
                remaining -= tWall;

                if (remaining <= 0) break;
                if (Math.abs(ax - 8) < 1 || Math.abs(ax - (width - 8)) < 1) adx *= -1;
                if (Math.abs(ay - 68) < 1) ady *= -1;
            }

            ctx.stroke();
            ctx.setLineDash([]);
            ctx.restore();
        }

        /* Balls */
        balls.forEach((b, bIdx) => {
            // Save trail point
            b.trail.push({ x: b.x, y: b.y });
            if (b.trail.length > 8) b.trail.shift();

            for (let s = 0; s < timeScale; s++) {
                b.x += b.dx; b.y += b.dy;
                if (b.x < 8)        { b.x = 8;         b.dx *= -1; }
                if (b.x > width - 8){ b.x = width - 8; b.dx *= -1; }
                if (b.y < 68)       { b.y = 68;         b.dy *= -1; }
                if (b.y > cannon.y + 10) b.active = false;

                bricks.forEach((br, brIdx) => {
                    if (b.x + 6 > br.x && b.x - 6 < br.x + br.w &&
                        b.y + 6 > br.y && b.y - 6 < br.y + br.h) {
                        if (b.x < br.x || b.x > br.x + br.w) b.dx *= -1;
                        else b.dy *= -1;
                        br.hp--; score++;
                        createParticles(b.x, b.y, br.glowColor || br.color);
                        if (br.hp <= 0) bricks.splice(brIdx, 1);
                        updateUI();
                    }
                });

                items.forEach((it, itIdx) => {
                    if (Math.hypot(b.x - it.x, b.y - it.y) < it.r + 8) {
                        extraBallsThisRound++;
                        createParticles(it.x, it.y, "#39ff14");
                        items.splice(itIdx, 1);
                    }
                });
            }

            // Draw trail
            b.trail.forEach((pt, ti) => {
                const a = (ti + 1) / b.trail.length;
                ctx.beginPath();
                ctx.arc(pt.x, pt.y, 5 * a, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${a * 0.3})`;
                ctx.fill();
            });

            // Draw ball with glow
            ctx.save();
            ctx.shadowColor = "#fff";
            ctx.shadowBlur  = 12;
            ctx.beginPath();
            ctx.arc(b.x, b.y, 7, 0, Math.PI * 2);
            const bg = ctx.createRadialGradient(b.x - 2, b.y - 2, 1, b.x, b.y, 7);
            bg.addColorStop(0, "#fff");
            bg.addColorStop(1, "rgba(200,230,255,0.8)");
            ctx.fillStyle = bg;
            ctx.fill();
            ctx.restore();
        });

        balls = balls.filter(b => b.active);

        if (isShooting && balls.length === 0) {
            round++;
            nextTurn();
        }

        /* Bricks */
        bricks.forEach(br => {
            drawGlowRect(br.x, br.y, br.w, br.h, br.color, br.glowColor, br.hp, round);
        });

        /* Cannon */
        drawCannon();

        requestAnimationFrame(update);
    }

    /* ── AdSense Lazy Push ── */
    (function() {
        function mgPushAds() {
            document.querySelectorAll('ins.adsbygoogle').forEach(function(ins) {
                if (!ins.getAttribute('data-adsbygoogle-status')) {
                    try { (window.adsbygoogle = window.adsbygoogle || []).push({}); } catch(e) {}
                }
            });
        }
        // Sayfa yüklenince (startScreen görünür)
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function() { setTimeout(mgPushAds, 800); });
        } else {
            setTimeout(mgPushAds, 800);
        }
        // gameOverScreen açılınca push et
        document.addEventListener('DOMContentLoaded', function() {
            var goScreen = document.getElementById('gameOverScreen');
            if (goScreen) {
                new MutationObserver(function(mutations) {
                    mutations.forEach(function(m) {
                        if (m.type === 'attributes' && m.attributeName === 'style') {
                            if (goScreen.style.display !== 'none') { setTimeout(mgPushAds, 300); }
                        }
                    });
                }).observe(goScreen, { attributes: true });
            }
        });
    })();
</script>
