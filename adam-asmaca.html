<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karakteri Kurtar</title>
<!-- Kelimeler dosyasını asmaca klasöründen çekiyoruz -->
<script src="sorular/kelimeler.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Baloo+2:wght@500;600;700&display=swap');

* { box-sizing: border-box; }

:root {
    --cream: #fef6e4;
    --peach: #f3d2c1;
    --sky: #8bd3dd;
    --sky-dark: #5cb3bd;
    --yellow: #f9e29c;
    --yellow-dark: #e0b95c;
    --orange: #ffd6a5;
    --orange-dark: #e0a15c;
    --green: #a8e6b0;
    --green-dark: #5cb56a;
    --red: #ffb3b3;
    --red-dark: #d16060;
    --ink: #3d3d3d;
    --ink-soft: #6b5b2a;
}

body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Fredoka', sans-serif;
    color: var(--ink);
    background: linear-gradient(160deg, var(--cream) 0%, var(--peach) 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
}

/* yumuşak dekoratif bulut şekilleri */
.bg-blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(0px);
    opacity: 0.5;
    z-index: 0;
    pointer-events: none;
}
.bg-blob.b1 { width: 220px; height: 220px; background: var(--sky); top: -80px; left: -80px; opacity: 0.35; }
.bg-blob.b2 { width: 260px; height: 260px; background: var(--yellow); bottom: -100px; right: -100px; opacity: 0.4; }
.bg-blob.b3 { width: 140px; height: 140px; background: var(--green); top: 40%; right: -60px; opacity: 0.25; }

/* ---------- ÜST ÇUBUK ---------- */
.nav-bar {
    width: 100%;
    max-width: 900px;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-sizing: border-box;
    position: relative;
    z-index: 2;
}

.back-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--ink);
    text-decoration: none;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    background: white;
    border: none;
    border-radius: 14px;
    padding: 9px 16px;
    cursor: pointer;
    box-shadow: 0 4px 0 #d8ccb8;
    transition: 0.15s;
}
.back-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #d8ccb8; }

.logo {
    font-weight: 700;
    font-size: 1.25rem;
    color: var(--sky-dark);
    -webkit-text-stroke: 1.5px var(--ink);
    text-stroke: 1.5px var(--ink);
    display: flex;
    align-items: center;
    gap: 6px;
}

.hearts {
    font-size: 1.3rem;
    letter-spacing: 3px;
    background: white;
    padding: 6px 14px;
    border-radius: 16px;
    box-shadow: 0 4px 0 #d8ccb8;
}
#topStats {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0;
    font-family: 'Baloo 2', sans-serif;
}

.mute-icon-btn {
    border: none;
    background: white;
    font-size: 1.1rem;
    line-height: 1;
    padding: 8px;
    width: 36px;
    height: 36px;
    border-radius: 12px;
    box-shadow: 0 4px 0 #d8ccb8;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.15s;
}
.mute-icon-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #d8ccb8; }

/* ---------- ANA ALAN ---------- */
.stage {
    width: 100%;
    max-width: 900px;
    padding: 4px 16px 20px;
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
}

.score-row {
    display: flex;
    gap: 12px;
}
.pill {
    background: white;
    border-radius: 16px;
    padding: 8px 16px;
    font-family: 'Baloo 2', sans-serif;
    font-weight: 600;
    font-size: 0.8rem;
    box-shadow: 0 4px 0 #d8ccb8;
    display: flex;
    align-items: center;
    gap: 6px;
}
.pill b { color: var(--sky-dark); font-size: 1rem; }

/* ---------- OYUN KUTUSU ---------- */
.board {
    width: 100%;
    background: white;
    border-radius: 28px;
    padding: 16px;
    box-shadow: 0 8px 0 #d8ccb8, 0 20px 40px rgba(0,0,0,0.08);
    display: grid;
    grid-template-columns: 1fr 1.1fr;
    gap: 16px;
}

@media (max-width: 720px) {
    .board { grid-template-columns: 1fr; }
}

.drawing-side {
    background: linear-gradient(180deg, #eef7f8, #ffffff);
    border-radius: 22px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px;
}

.hangman-svg {
    width: 100%;
    max-width: 150px;
    height: 150px;
    stroke: var(--ink);
    stroke-width: 5;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
}

.part { opacity: 0; transition: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
.is-visible { opacity: 1; stroke: var(--red-dark); }

.progress-caption {
    margin-top: 10px;
    font-family: 'Baloo 2', sans-serif;
    font-size: 0.8rem;
    color: var(--ink-soft);
    text-align: center;
}

.game-side {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 14px;
}

.hint-box {
    background: var(--yellow);
    border-radius: 14px;
    padding: 8px 12px;
    font-size: 0.78rem;
    color: var(--ink-soft);
    font-weight: 500;
    display: flex;
    flex-direction: column;
    gap: 5px;
}
.hint-box .label { font-weight: 700; color: var(--ink); font-size: 0.85rem; }
.score-guide { font-size: 0.6rem; color: var(--ink-soft); opacity: 0.85; line-height: 1.3; }

.hint-buy-btn {
    align-self: flex-start;
    font-family: 'Baloo 2', sans-serif;
    font-weight: 600;
    font-size: 0.68rem;
    background: white;
    border: none;
    border-radius: 10px;
    padding: 5px 10px;
    cursor: pointer;
    box-shadow: 0 3px 0 #d8ccb8;
}
.hint-buy-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.hint-buy-btn:active:not(:disabled) { transform: translateY(2px); box-shadow: 0 1px 0 #d8ccb8; }

.share-btn {
    align-self: center;
    font-family: 'Baloo 2', sans-serif;
    font-weight: 600;
    font-size: 0.78rem;
    background: var(--sky);
    color: var(--ink);
    border: none;
    border-radius: 12px;
    padding: 9px 18px;
    cursor: pointer;
    box-shadow: 0 3px 0 var(--sky-dark);
    transition: 0.12s;
}
.share-btn:active { transform: translateY(3px); box-shadow: 0 0 0 var(--sky-dark); }

.word-display {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: nowrap;
    margin: 4px 0;
    width: 100%;
}

.letter {
    flex: 1 1 32px;
    max-width: 32px;
    aspect-ratio: 32 / 42;
    min-width: 0;
    background: #eef7f8;
    border-radius: 10px;
    border-bottom: 4px solid var(--sky);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: clamp(0.7rem, 4vw, 1.3rem);
    color: var(--ink);
    transition: 0.2s;
}
.letter.revealed { animation: bounceIn 0.4s ease; border-color: var(--green-dark); background: #eafaf0; }
@keyframes bounceIn {
    0% { transform: scale(0.4); opacity: 0; }
    60% { transform: scale(1.2); }
    100% { transform: scale(1); opacity: 1; }
}

.keyboard {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 7px;
}

.key {
    border: none;
    border-radius: 10px;
    padding: 10px 0;
    background: var(--orange);
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    color: var(--ink);
    box-shadow: 0 3px 0 var(--orange-dark);
    cursor: pointer;
    transition: 0.12s;
}
.key:active:not(:disabled) { transform: translateY(3px); box-shadow: 0 0 0 var(--orange-dark); }
.key:disabled { opacity: 0.35; cursor: not-allowed; }
.key.hit { background: var(--green); box-shadow: 0 3px 0 var(--green-dark); }
.key.miss { background: var(--red); box-shadow: 0 3px 0 var(--red-dark); }

.bottom-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
}

.mute-btn {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 600;
    font-size: 0.72rem;
    background: white;
    border: none;
    border-radius: 12px;
    padding: 8px 14px;
    cursor: pointer;
    box-shadow: 0 3px 0 #d8ccb8;
}

.streak-badge {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    font-size: 0.75rem;
    background: var(--yellow);
    padding: 8px 14px;
    border-radius: 12px;
    color: var(--ink-soft);
}

/* ---------- MODAL ---------- */
.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(61, 61, 61, 0.55);
    z-index: 2000;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    backdrop-filter: blur(4px);
}

.modal-box {
    background: white;
    padding: 40px 44px;
    border-radius: 30px;
    text-align: center;
    max-width: 400px;
    box-shadow: 0 12px 0 #d8ccb8, 0 30px 60px rgba(0,0,0,0.25);
    animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes popIn {
    0% { transform: scale(0.7); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}

.modal-emoji { font-size: 3.2rem; margin-bottom: 6px; }

#modalTitle {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    font-size: 1.6rem;
    margin: 0;
}

#modalMsg {
    margin: 14px 0;
    font-size: 1rem;
    color: var(--ink-soft);
    font-weight: 500;
}

.modal-stats {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 16px 0;
    font-family: 'Baloo 2', sans-serif;
}
.modal-stats div { font-size: 0.7rem; color: var(--ink-soft); font-weight: 600; }
.modal-stats b { display: block; font-size: 1.3rem; color: var(--ink); }

.restart-btn {
    background: var(--sky);
    color: var(--ink);
    border: none;
    padding: 13px 34px;
    font-weight: 700;
    border-radius: 18px;
    cursor: pointer;
    margin-top: 6px;
    font-family: 'Baloo 2', sans-serif;
    font-size: 0.95rem;
    box-shadow: 0 5px 0 var(--sky-dark);
    transition: 0.12s;
}
.restart-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 var(--sky-dark); }

/* toast */
.toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: white;
    color: var(--ink);
    padding: 10px 20px;
    border-radius: 16px;
    font-family: 'Baloo 2', sans-serif;
    font-weight: 600;
    font-size: 0.8rem;
    opacity: 0;
    pointer-events: none;
    transition: 0.35s;
    z-index: 1500;
    box-shadow: 0 4px 0 #d8ccb8;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="bg-blob b1"></div>
<div class="bg-blob b2"></div>
<div class="bg-blob b3"></div>

<nav class="nav-bar">
    <button class="back-btn" onclick="goBack()">← Geri</button>
    <span class="logo">🎈 Karakteri Kurtar</span>
    <button class="mute-icon-btn" id="muteBtn" onclick="toggleMute()">🔊</button>
</nav>

<div class="stage">

    <div class="score-row">
        <div class="pill">⭐ Skor: <b id="scoreCount">0</b></div>
        <div class="pill">🔥 Seri: <b id="streakCount">0</b></div>
        <div class="pill">🏆 Rekor: <b id="bestCountTop">0</b></div>
    </div>

    <div class="board">
        <div class="drawing-side">
            <svg class="hangman-svg" viewBox="0 0 100 100">
                <path d="M20 90 L80 90 M30 90 L30 10 L70 10 L70 20" />
                <circle id="p1" class="part" cx="70" cy="30" r="8" />
                <line id="p2" class="part" x1="70" y1="38" x2="70" y2="65" />
                <line id="p3" class="part" x1="70" y1="45" x2="55" y2="55" />
                <line id="p4" class="part" x1="70" y1="45" x2="85" y2="55" />
                <line id="p5" class="part" x1="70" y1="65" x2="55" y2="80" />
                <line id="p6" class="part" x1="70" y1="65" x2="85" y2="80" />
            </svg>
            <div class="progress-caption" id="progressCaption">Hadi başlayalım!</div>
        </div>

        <div class="game-side">
            <div class="hint-box">
                <span class="label">💡 İpucu</span>
                <span id="hintText">Yükleniyor...</span>
                <button class="hint-buy-btn" id="extraHintBtn" onclick="revealExtraHint()">🔍 Harf Aç (-15 puan)</button>
                <span class="score-guide">✅ Doğru harf: +10 puan &nbsp;•&nbsp; 🔍 Harf açma: -15 puan &nbsp;•&nbsp; 🎉 Kazanınca: +25 puan</span>
            </div>

            <button class="share-btn" id="shareBtn" onclick="downloadAsPng()">📥 PNG İndir</button>

            <div id="wordDisplay" class="word-display"></div>

            <div id="keyboard" class="keyboard"></div>
        </div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-box">
        <div class="modal-emoji" id="modalEmoji">🎉</div>
        <h2 id="modalTitle"></h2>
        <p id="modalMsg"></p>
        <div class="modal-stats">
            <div><b id="finalScore">0</b>PUAN</div>
            <div><b id="finalStreak">0</b>SERİ</div>
            <div><b id="finalBest">0</b>REKOR</div>
        </div>
        <button class="restart-btn" onclick="initGame()">Yeni Kelime 🎲</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    // ---------- Geri dön butonu ----------
    function goBack() {
        window.location.href = "https://mugol-portal.github.io/mugol-.iq/";
    }

    // ---------- Hata koruması / yedek kelime listesi ----------
    const yedekKelimeler = [{ kelime: "ASMACA", ipucu: "Bu oyunun adı nedir?" }];
    let aktifListe = (typeof kelimeListesi !== 'undefined') ? kelimeListesi : yedekKelimeler;

    // ---------- Oyun durumu ----------
    let word, hint, guessed, mistakes;
    let maxMistakes = 6;
    let score = 0;
    let streak = 0;
    let best = Number(safeGet("ka_best", 0));
    let soundOn = true;
    let extraHintUsed = false;
    let kullanilanIndexler = [];

    function safeGet(key, fallback) {
        try { const v = localStorage.getItem(key); return v !== null ? v : fallback; }
        catch(e) { return fallback; }
    }
    function safeSet(key, value) {
        try { localStorage.setItem(key, value); } catch(e) {}
    }

    // ---------- Ses efektleri (WebAudio) ----------
    let audioCtx;
    function beep(freq, duration, type) {
        if (!soundOn) return;
        try {
            audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type || "sine";
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        } catch(e) {}
    }
    const sfx = {
        hit: () => beep(660, 0.15, "triangle"),
        miss: () => beep(180, 0.2, "sawtooth"),
        win: () => { beep(523,0.15); setTimeout(()=>beep(659,0.15),120); setTimeout(()=>beep(784,0.3),240); },
        lose: () => { beep(220,0.3,"sawtooth"); setTimeout(()=>beep(160,0.4,"sawtooth"),200); },
        tick: () => beep(880, 0.05, "square")
    };

    function toggleMute() {
        soundOn = !soundOn;
        document.getElementById("muteBtn").innerText = soundOn ? "🔊" : "🔇";
    }

    function showToast(msg) {
        const t = document.getElementById("toast");
        t.innerText = msg;
        t.classList.add("show");
        clearTimeout(showToast._tm);
        showToast._tm = setTimeout(() => t.classList.remove("show"), 1800);
    }

    // ---------- PNG olarak indir / paylaş ----------
    function downloadAsPng() {
        if (typeof html2canvas === 'undefined') {
            showToast("PNG aracı yüklenemedi 😿");
            return;
        }
        const OUT_W = 1080, OUT_H = 1350;

        // Gizli, PNG'ye özel şablon oluştur (klavye ve ipucu kutusu içermez)
        const tpl = document.createElement("div");
        tpl.style.position = "fixed";
        tpl.style.left = "-9999px";
        tpl.style.top = "0";
        tpl.style.width = "600px";
        tpl.style.background = "linear-gradient(160deg, #fef6e4 0%, #f3d2c1 100%)";
        tpl.style.padding = "36px 30px";
        tpl.style.boxSizing = "border-box";
        tpl.style.fontFamily = "'Fredoka', sans-serif";
        tpl.style.display = "flex";
        tpl.style.flexDirection = "column";
        tpl.style.alignItems = "center";
        tpl.style.gap = "22px";

        const gameTitle = document.createElement("div");
        gameTitle.style.fontFamily = "'Baloo 2', sans-serif";
        gameTitle.style.fontWeight = "700";
        gameTitle.style.fontSize = "2rem";
        gameTitle.style.color = "#3d3d3d";
        gameTitle.style.display = "flex";
        gameTitle.style.alignItems = "center";
        gameTitle.style.gap = "10px";
        gameTitle.innerHTML = `<span>🎈</span><span>Karakteri Kurtar</span>`;

        const svgClone = document.querySelector(".hangman-svg").cloneNode(true);
        svgClone.style.width = "100%";
        svgClone.style.maxWidth = "250px";
        svgClone.style.height = "250px";
        svgClone.style.stroke = "#3d3d3d";
        svgClone.style.strokeWidth = "5";
        svgClone.style.fill = "none";
        svgClone.style.strokeLinecap = "round";
        svgClone.style.strokeLinejoin = "round";
        svgClone.querySelectorAll(".part.is-visible").forEach(p => { p.style.opacity = "1"; p.style.stroke = "#d16060"; });
        svgClone.querySelectorAll(".part:not(.is-visible)").forEach(p => { p.style.opacity = "0"; });

        const drawWrap = document.createElement("div");
        drawWrap.style.background = "linear-gradient(180deg, #eef7f8, #ffffff)";
        drawWrap.style.borderRadius = "24px";
        drawWrap.style.padding = "26px";
        drawWrap.style.width = "100%";
        drawWrap.style.boxSizing = "border-box";
        drawWrap.style.boxShadow = "0 8px 0 #d8ccb8, 0 16px 30px rgba(0,0,0,0.08)";
        drawWrap.style.display = "flex";
        drawWrap.style.justifyContent = "center";
        drawWrap.appendChild(svgClone);

        const hintBig = document.createElement("div");
        hintBig.style.background = "linear-gradient(160deg, #f9e29c, #f7d876)";
        hintBig.style.borderRadius = "18px";
        hintBig.style.padding = "22px 24px";
        hintBig.style.width = "100%";
        hintBig.style.boxSizing = "border-box";
        hintBig.style.boxShadow = "0 6px 0 #e0b95c";
        hintBig.style.textAlign = "center";
        hintBig.style.display = "flex";
        hintBig.style.flexDirection = "column";
        hintBig.style.alignItems = "center";
        hintBig.style.gap = "6px";

        const hintLabel = document.createElement("div");
        hintLabel.style.fontFamily = "'Baloo 2', sans-serif";
        hintLabel.style.fontWeight = "700";
        hintLabel.style.fontSize = "0.85rem";
        hintLabel.style.letterSpacing = "1px";
        hintLabel.style.color = "#8a6d1f";
        hintLabel.style.textTransform = "uppercase";
        hintLabel.innerText = "💡 İpucu";

        const hintText = document.createElement("div");
        hintText.style.fontWeight = "700";
        hintText.style.fontSize = "1.7rem";
        hintText.style.color = "#3d3d3d";
        hintText.innerText = hint;

        hintBig.appendChild(hintLabel);
        hintBig.appendChild(hintText);

        const wordClone = document.getElementById("wordDisplay").cloneNode(true);
        wordClone.style.display = "flex";
        wordClone.style.justifyContent = "center";
        wordClone.style.flexWrap = "wrap";
        wordClone.style.gap = "10px";
        wordClone.querySelectorAll(".letter").forEach(l => {
            l.style.width = "44px";
            l.style.height = "56px";
            l.style.maxWidth = "44px";
            l.style.fontSize = "1.5rem";
            l.style.background = "#eef7f8";
            l.style.borderRadius = "10px";
            l.style.borderBottom = "4px solid #8bd3dd";
            l.style.boxShadow = "0 3px 0 #d8ccb8";
            l.style.display = "flex";
            l.style.alignItems = "center";
            l.style.justifyContent = "center";
            l.style.fontWeight = "700";
            l.style.color = "#3d3d3d";
        });

        const slogan = document.createElement("div");
        slogan.style.marginTop = "6px";
        slogan.style.fontFamily = "'Baloo 2', sans-serif";
        slogan.style.fontWeight = "700";
        slogan.style.fontSize = "1.3rem";
        slogan.style.color = "#6b5b2a";
        slogan.style.textAlign = "center";
        slogan.innerText = "Harfleri Çöz, Karakteri Kurtar!";

        tpl.appendChild(gameTitle);
        tpl.appendChild(drawWrap);
        tpl.appendChild(hintBig);
        tpl.appendChild(wordClone);
        tpl.appendChild(slogan);
        document.body.appendChild(tpl);

        const renderTpl = () => new Promise(resolve => setTimeout(resolve, 50)).then(() => html2canvas(tpl, { backgroundColor: "#fef6e4", scale: 2 }));
        const fontsReady = (document.fonts && document.fonts.ready) ? document.fonts.ready : Promise.resolve();

        fontsReady.then(renderTpl).then(canvas => {
            document.body.removeChild(tpl);
            const outCanvas = document.createElement("canvas");
            outCanvas.width = OUT_W;
            outCanvas.height = OUT_H;
            const ctx = outCanvas.getContext("2d");
            ctx.fillStyle = "#fef6e4";
            ctx.fillRect(0, 0, OUT_W, OUT_H);

            const scale = Math.min(OUT_W / canvas.width, OUT_H / canvas.height);
            const drawW = canvas.width * scale;
            const drawH = canvas.height * scale;
            const offsetX = (OUT_W - drawW) / 2;
            const offsetY = (OUT_H - drawH) / 2;
            ctx.drawImage(canvas, offsetX, offsetY, drawW, drawH);

            outCanvas.toBlob(blob => {
                if (!blob) { showToast("PNG oluşturulamadı 😿"); return; }
                const fileName = `karakteri-kurtar-${Date.now()}.png`;
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast("PNG indirildi! 📥");
            }, "image/png");
        }).catch(() => {
            if (document.body.contains(tpl)) document.body.removeChild(tpl);
            showToast("PNG oluşturulamadı 😿");
        });
    }

    // ---------- Tekrar etmeyen kelime seçimi ----------
    function kelimeSec() {
        // Tüm kelimeler kullanıldıysa listeyi sıfırla
        if (kullanilanIndexler.length >= aktifListe.length) {
            kullanilanIndexler = [];
        }
        let index;
        do {
            index = Math.floor(Math.random() * aktifListe.length);
        } while (kullanilanIndexler.includes(index));
        kullanilanIndexler.push(index);
        return aktifListe[index];
    }

    // ---------- Oyun başlatma ----------
    function initGame() {
        maxMistakes = 6;
        extraHintUsed = false;

        const item = kelimeSec();
        word = item.kelime.toUpperCase('tr-TR');
        hint = item.ipucu;
        guessed = [];
        mistakes = 0;

        document.getElementById("hintText").innerText = hint;
        document.getElementById("extraHintBtn").disabled = false;
        document.getElementById("modal").style.display = "none";
        document.getElementById("progressCaption").innerText = "Hadi başlayalım!";
        document.querySelectorAll(".part").forEach(p => p.classList.remove("is-visible"));

        renderWord();
        renderKeyboard();
        updateHUD();
    }

    function updateHUD() {
        document.getElementById("scoreCount").innerText = score;
        document.getElementById("streakCount").innerText = streak;
        document.getElementById("bestCountTop").innerText = best;
    }

    // ---------- Kelime & klavye ----------
    function renderWord() {
        const display = word.split("").map(l =>
            `<div class="letter ${guessed.includes(l) ? 'revealed' : ''}">${guessed.includes(l) ? l : ""}</div>`
        ).join("");
        document.getElementById("wordDisplay").innerHTML = display;

        if (word.split("").every(l => guessed.includes(l))) endGame(true);
    }

    function renderKeyboard() {
        const harfler = "ABCÇDEFGĞHIİJKLMNOÖPRSŞTUÜVYZ";
        const kb = document.getElementById("keyboard");
        kb.innerHTML = "";

        harfler.split("").forEach(l => {
            const btn = document.createElement("button");
            btn.className = "key";
            btn.innerText = l;
            btn.onclick = () => handleGuess(l);
            kb.appendChild(btn);
        });
    }

    function handleGuess(l) {
        if (guessed.includes(l)) return;
        guessed.push(l);

        const buttons = document.querySelectorAll(".key");
        const btn = Array.from(buttons).find(b => b.innerText === l);

        if (word.includes(l)) {
            if (btn) btn.classList.add("hit");
            score += 10;
            sfx.hit();
            renderWord();
        } else {
            mistakes++;
            if (btn) btn.classList.add("miss");
            sfx.miss();
            const part = document.getElementById(`p${Math.min(mistakes, 6)}`);
            if (part) part.classList.add("is-visible");
            document.getElementById("progressCaption").innerText = "Dikkatli ol, hata yapma!";
            if (mistakes >= maxMistakes) {
                endGame(false);
            }
        }
        if (btn) btn.disabled = true;
        updateHUD();
    }

    // ---------- Ekstra ipucu satın alma ----------
    function revealExtraHint() {
        if (extraHintUsed) return;
        const remaining = word.split("").filter(l => !guessed.includes(l));
        if (remaining.length <= 1) { showToast("Kelime zaten neredeyse tamam! 🎯"); return; }

        const letter = remaining[Math.floor(Math.random() * remaining.length)];
        guessed.push(letter);
        score = Math.max(0, score - 15);
        extraHintUsed = true;
        document.getElementById("extraHintBtn").disabled = true;

        const btn = Array.from(document.querySelectorAll(".key")).find(b => b.innerText === letter);
        if (btn) { btn.classList.add("hit"); btn.disabled = true; }

        showToast(`"${letter}" harfini senin için buldum! 🔍`);
        renderWord();
        updateHUD();
    }

    // ---------- Oyun bitişi ----------
    function endGame(isWin) {
        const modal = document.getElementById("modal");
        const title = document.getElementById("modalTitle");
        const msg = document.getElementById("modalMsg");
        const emoji = document.getElementById("modalEmoji");

        if (isWin) {
            streak++;
            score += 25;
            emoji.innerText = "🎉";
            title.innerText = "Harikasın!";
            title.style.color = "var(--sky-dark)";
            msg.innerText = `"${word}" kelimesini buldun!`;
            sfx.win();
        } else {
            streak = 0;
            emoji.innerText = "😿";
            title.innerText = "Bu Sefer Olmadı!";
            title.style.color = "var(--red-dark)";
            msg.innerText = `Doğru kelime: "${word}" idi.`;
            sfx.lose();
        }

        best = Math.max(best, score);
        safeSet("ka_best", best);

        document.getElementById("finalScore").innerText = score;
        document.getElementById("finalStreak").innerText = streak;
        document.getElementById("finalBest").innerText = best;
        updateHUD();

        modal.style.display = "flex";
    }

    // ---------- Klavye desteği ----------
    window.onkeydown = (e) => {
        let key = e.key.toUpperCase('tr-TR');
        if (key === "I") key = "İ";
        const harfler = "ABCÇDEFGĞHIİJKLMNOÖPRSŞTUÜVYZ";
        if (harfler.includes(key)) handleGuess(key);
    };

    window.onload = initGame;
</script>
</body>
</html>
